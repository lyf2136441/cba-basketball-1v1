    ctx.lineTo(cx + headR * 1.12, headCY - headR * 0.05)
    ctx.arc(cx, headCY - headR * 0.05, headR * 1.12, 0, Math.PI)
    ctx.closePath(); ctx.fill()
  }

  // ---- Face ----
  // Eyebrows
  ctx.strokeStyle = hairColor; ctx.lineWidth = Math.max(0.8, r * 0.06); ctx.lineCap = 'round'
  ctx.beginPath(); ctx.moveTo(cx - headR * 0.45, headCY - headR * 0.3); ctx.lineTo(cx - headR * 0.08, headCY - headR * 0.22); ctx.stroke()
  ctx.beginPath(); ctx.moveTo(cx + headR * 0.45, headCY - headR * 0.3); ctx.lineTo(cx + headR * 0.08, headCY - headR * 0.22); ctx.stroke()

  // Eyes
  var eyeSY = headCY - headR * 0.05
  ctx.fillStyle = '#fff'
  ctx.beginPath(); ctx.ellipse(cx - headR * 0.27, eyeSY, headR * 0.18, headR * 0.14, 0, 0, Math.PI * 2); ctx.fill()
  ctx.beginPath(); ctx.ellipse(cx + headR * 0.27, eyeSY, headR * 0.18, headR * 0.14, 0, 0, Math.PI * 2); ctx.fill()
  ctx.fillStyle = '#111'
  ctx.beginPath(); ctx.arc(cx - headR * 0.25, eyeSY, headR * 0.09, 0, Math.PI * 2); ctx.fill()
  ctx.beginPath(); ctx.arc(cx + headR * 0.29, eyeSY, headR * 0.09, 0, Math.PI * 2); ctx.fill()
  ctx.fillStyle = '#fff'
  ctx.beginPath(); ctx.arc(cx - headR * 0.27, eyeSY - headR * 0.04, headR * 0.035, 0, Math.PI * 2); ctx.fill()
  ctx.beginPath(); ctx.arc(cx + headR * 0.27, eyeSY - headR * 0.04, headR * 0.035, 0, Math.PI * 2); ctx.fill()

  // Nose
  ctx.strokeStyle = sd; ctx.lineWidth = blw + 0.2
  ctx.beginPath(); ctx.moveTo(cx, headCY - headR * 0.1); ctx.lineTo(cx, headCY + headR * 0.15); ctx.stroke()
  ctx.beginPath(); ctx.arc(cx - headR * 0.06, headCY + headR * 0.15, headR * 0.07, 0.1, Math.PI - 0.1); ctx.stroke()

  // Mouth
  ctx.strokeStyle = '#b87060'; ctx.lineWidth = Math.max(0.5, r * 0.03)
  ctx.beginPath(); ctx.arc(cx, headCY + headR * 0.28, headR * 0.16, 0.15, Math.PI - 0.15); ctx.stroke()

  // ---- HEADBAND ----
  if (data.num && data.num >= 10) {
    var hbTop = headCY - headR * 0.85
    ctx.fillStyle = '#fff'
    ctx.fillRect(cx - headR * 0.95, hbTop, headR * 1.9, headR * 0.12)
    ctx.beginPath()
    ctx.moveTo(cx + headR * 0.85, hbTop + headR * 0.02); ctx.lineTo(cx + headR * 1.05, hbTop - headR * 0.1); ctx.lineTo(cx + headR * 0.88, hbTop + headR * 0.08)
    ctx.closePath(); ctx.fill()
  }

  // ---- NAME ----
  ctx.fillStyle = 'rgba(255,255,255,0.7)'
  ctx.font = 'bold ' + Math.floor(r * 0.3) + 'px sans-serif'
  ctx.textAlign = 'center'; ctx.textBaseline = 'top'
  ctx.fillText(data.name || '', cx, footY + this._s(3))

  // ---- POSSESSION INDICATOR ----
  if (this.ball.has) {
    var indY = headCY - headR - this._s(12)
    var indW = r * 0.55; var indH = r * 0.24
    var indColor = label === '攻' ? '#ffaa00' : '#ff5555'
    ctx.fillStyle = indColor
    ctx.beginPath()
    this._roundRect(ctx, cx - indW / 2, indY, indW, indH, r * 0.12)
    ctx.fill()
    ctx.fillStyle = '#fff'
    ctx.font = 'bold ' + Math.floor(r * 0.26) + 'px sans-serif'
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
    ctx.fillText(label === '攻' ? '进攻' : '防守', cx, indY + indH / 2)
  }

  ctx.restore()
}

GameEngine.prototype._rgba = function(hex, alpha) {
  var r, g, b
  if (hex[0] === '#') {
    r = parseInt(hex.substr(1, 2), 16)
    g = parseInt(hex.substr(3, 2), 16)
    b = parseInt(hex.substr(5, 2), 16)
  } else { return hex }
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')'
}

GameEngine.prototype._darken = function(hex, amount) {
  var r, g, b
  if (hex[0] === '#') {
    r = parseInt(hex.substr(1, 2), 16)
    g = parseInt(hex.substr(3, 2), 16)
    b = parseInt(hex.substr(5, 2), 16)
  } else { return hex }
  r = Math.floor(r * (1 - amount))
  g = Math.floor(g * (1 - amount))
  b = Math.floor(b * (1 - amount))
  return 'rgb(' + r + ',' + g + ',' + b + ')'
}

GameEngine.prototype._lighten = function(hex, amount) {
  var r, g, b
  if (hex[0] === '#') {
    r = parseInt(hex.substr(1, 2), 16)
    g = parseInt(hex.substr(3, 2), 16)
    b = parseInt(hex.substr(5, 2), 16)
  } else { return hex }
  r = Math.min(255, Math.floor(r + (255 - r) * amount))
  g = Math.min(255, Math.floor(g + (255 - g) * amount))
  b = Math.min(255, Math.floor(b + (255 - b) * amount))
  return 'rgb(' + r + ',' + g + ',' + b + ')'
}

GameEngine.prototype._roundRect = function(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y)
  ctx.lineTo(x + w - r, y)
  ctx.arcTo(x + w, y, x + w, y + r, r)
  ctx.lineTo(x + w, y + h - r)
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r)
  ctx.lineTo(x + r, y + h)
  ctx.arcTo(x + r, y + h, x, y + h - r, r)
  ctx.lineTo(x, y + r)
  ctx.arcTo(x, y, x + r, y, r)
  ctx.closePath()
}

GameEngine.prototype._drawBall = function(ctx) {
  var bx = this.ball.x, by = this.ball.y, br = this.ball.r

  // Loose ball glow
  if (this.ballLoose) {
    var pulse = 0.5 + 0.5 * Math.sin(Date.now() / 250)
    ctx.strokeStyle = 'rgba(0,255,136,' + (0.3 + pulse * 0.4) + ')'
    ctx.lineWidth = 3 + pulse * 2
    ctx.beginPath()
    ctx.arc(bx, by, br + this._s(8) + pulse * this._s(4), 0, Math.PI * 2)
    ctx.stroke()
  }

  // Trail
  if (this.ballInAir) {
    for (var i = 0; i < this._trail.length; i++) {
      var t = this._trail[i]
      var alpha = t.life / 300 * 0.25
      if (alpha > 0) {
        ctx.fillStyle = 'rgba(255,140,0,' + alpha + ')'
        ctx.beginPath(); ctx.arc(t.x, t.y, br * 0.5, 0, Math.PI * 2); ctx.fill()
      }
    }
  }

  // Ball shadow on floor
  if (this.ballInAir) {
    var shAlpha = 0.08 + (by / this._s(COURT_H)) * 0.1
    ctx.fillStyle = 'rgba(0,0,0,' + shAlpha + ')'
    ctx.beginPath()
    ctx.ellipse(bx, this._s(FLOOR_Y - 2), br * 0.7, br * 0.25, 0, 0, Math.PI * 2)
    ctx.fill()
  }

  // Ball body with orange gradient
  var grad = ctx.createRadialGradient(bx - br * 0.3, by - br * 0.35, br * 0.1, bx, by, br)
  grad.addColorStop(0, '#ffbb44')
  grad.addColorStop(0.6, '#ee8811')
  grad.addColorStop(1, '#bb5500')
  ctx.fillStyle = grad
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#884400'; ctx.lineWidth = 1.2; ctx.stroke()

  // Ball seams (rotating)
  ctx.save()
  ctx.translate(bx, by)
  ctx.rotate(this.ball.rot || 0)
  ctx.strokeStyle = '#2a1a08'; ctx.lineWidth = 0.9
  // Horizontal seam
  ctx.beginPath(); ctx.moveTo(-br * 0.95, 0); ctx.lineTo(br * 0.95, 0); ctx.stroke()
  // Vertical seam
  ctx.beginPath(); ctx.moveTo(0, -br * 0.95); ctx.lineTo(0, br * 0.95); ctx.stroke()
  // Curved seams
  ctx.beginPath(); ctx.arc(0, 0, br * 0.55, -0.6, 0.6); ctx.stroke()
  ctx.beginPath(); ctx.arc(0, 0, br * 0.55, Math.PI - 0.6, Math.PI + 0.6); ctx.stroke()
  ctx.restore()

  // Ball highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  ctx.beginPath()
  ctx.arc(bx - br * 0.3, by - br * 0.3, br * 0.25, 0, Math.PI * 2)
  ctx.fill()
}

GameEngine.prototype._drawParticles = function(ctx) {
  for (var i = 0; i < this._particles.length; i++) {
    var pt = this._particles[i]
    var alpha = pt.life / 700
    if (alpha > 0) {
      ctx.fillStyle = pt.color; ctx.globalAlpha = alpha
      ctx.beginPath(); ctx.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2); ctx.fill()
    }
  }
  ctx.globalAlpha = 1
}

GameEngine.prototype._drawScorePopups = function(ctx) {
  for (var i = 0; i < this._scorePopups.length; i++) {
    var p = this._scorePopups[i]
    var alpha = Math.min(1, p.life / 600)
    var scale = 1 + (1 - p.life / p.maxLife) * 0.5
    ctx.save()
    ctx.globalAlpha = alpha
    ctx.translate(p.x, p.y)
    ctx.scale(scale, scale)
    ctx.font = 'bold ' + this._s(22) + 'px sans-serif'
    ctx.fillStyle = '#ffd700'
    ctx.textAlign = 'center'
    ctx.fillText(p.text, 0, 0)
    ctx.restore()
  }
}

GameEngine.prototype._drawUI = function(ctx) {
  var w = this.w, h = this.h, s = this.s
  var p1 = this.p1, p2 = this.p2

  // === Scoreboard bar ===
  var barH = this._s(36), barY = this._s(2)
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, barY, w, barH)
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(0, barY + barH - 1, w, 1)

  // Team colors
  var c1 = p1 ? (p1.teamColor || '#1a6dd4') : '#1a6dd4'
  var c2 = p2 ? (p2.teamColor || '#e03030') : '#e03030'
  ctx.fillStyle = c1; ctx.fillRect(this._s(4), barY + this._s(3), this._s(3), barH - this._s(6))
  ctx.fillStyle = c2; ctx.fillRect(w - this._s(7), barY + this._s(3), this._s(3), barH - this._s(6))

  // Player names
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + Math.floor(this._s(11)) + 'px sans-serif'; ctx.textBaseline = 'middle'
  ctx.textAlign = 'left'; ctx.fillText((p1 ? p1.name : 'P1'), this._s(12), barY + barH / 2)
  ctx.textAlign = 'right'; ctx.fillText((p2 ? p2.name : 'P2'), w - this._s(12), barY + barH / 2)

  // Score
  ctx.fillStyle = '#fff'; ctx.font = 'bold ' + Math.floor(this._s(16)) + 'px sans-serif'
  ctx.textAlign = 'center'
  var scText = this.score[0] + ' - ' + this.score[1]
  // Highlight if game point
  if (this.score[0] >= 10 || this.score[1] >= 10) ctx.fillStyle = '#ffd700'
  ctx.fillText(scText, w / 2, barY + barH / 2)

  // Shot clock & game time
  var clockX = w / 2 + this._s(40), clockY = barY + barH / 2
  var sc = Math.max(0, Math.ceil(24 - this.shotClockTimer / 1000))
  ctx.fillStyle = sc <= 5 ? '#ff4444' : 'rgba(255,255,255,0.6)'
  ctx.font = Math.floor(this._s(9)) + 'px sans-serif'
  ctx.fillText(sc + 's', clockX, clockY)
  var gm = Math.floor(Math.max(0, this.gameTimer / 1000) / 60)
  var gs = Math.floor(Math.max(0, this.gameTimer / 1000) % 60)
  ctx.fillText(gm + ':' + (gs < 10 ? '0' : '') + gs, w - this._s(50), clockY)

  // Possession indicator
  var px = this.poss === 0 ? this._s(12) : w - this._s(12)
  ctx.fillStyle = '#ff8c00'; ctx.beginPath()
  ctx.arc(px, barY + barH + this._s(8), this._s(4), 0, Math.PI * 2); ctx.fill()

  // === Score popup ===
  if (this.scoredAnim > 0 && this.shotResult) {
    var a2 = Math.min(1, this.scoredAnim / 600)
    var oy = (1200 - this.scoredAnim) / 1200 * this._s(60)
    ctx.fillStyle = this.shotResult.made ? 'rgba(255,215,0,' + a2 + ')' : 'rgba(255,100,100,' + a2 + ')'
    ctx.font = 'bold ' + Math.floor(this._s(28)) + 'px sans-serif'; ctx.textAlign = 'center'
    ctx.fillText(this.shotResult.made ? '+' + this.shotResult.pts : 'MISS', w / 2, this._s(220) - oy)
  }

  // Shot timing label
  if (this.shotReleased && this.shotResult) {
    var tc = this.shotResult.timing === '完美' ? '#ffd700' : this.shotResult.timing === '不错' ? '#0f0' : '#fff'
    ctx.fillStyle = tc; ctx.font = 'bold ' + Math.floor(this._s(13)) + 'px sans-serif'; ctx.textAlign = 'center'
    ctx.fillText(this.shotResult.timing, w / 2, this._s(250))
  }

  // Message
  if (this.msgTimer > 0) {
    var ma = Math.min(1, this.msgTimer / 300)
    ctx.fillStyle = 'rgba(255,255,255,' + ma + ')'
    ctx.font = 'bold ' + Math.floor(this._s(16)) + 'px sans-serif'; ctx.textAlign = 'center'
    ctx.fillText(this.msg, w / 2, this._s(320))
  }

  // Stamina bars (bottom corners)
  var sbW = this._s(50), sbH = this._s(4), sbY = h - this._s(20)
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(this._s(8), sbY, sbW, sbH)
  var sc2 = this.stamina / 100
  ctx.fillStyle = sc2 > 0.5 ? '#0c6' : sc2 > 0.25 ? '#fa0' : '#f44'
  ctx.fillRect(this._s(8), sbY, sbW * sc2, sbH)
}


// ============ SOUND SYSTEM ============
GameEngine.prototype._initSound = function() {
  try { this._audioCtx = new (window.AudioContext || window.webkitAudioContext)() } catch(e) { this._audioCtx = null }
}
GameEngine.prototype._playBeep = function(freq, dur, type, vol) {
  if (!this._audioCtx) return
  try {
    var ctx = this._audioCtx, o = ctx.createOscillator(), g = ctx.createGain()
    o.type = type || 'sine'; o.frequency.value = freq || 440
    g.gain.setValueAtTime(vol || 0.15, ctx.currentTime)
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur)
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + dur)
  } catch(e) {}
}
GameEngine.prototype._sfx = function(name) {
  if (!this._audioCtx) return
  try {
    if (name === 'swish') { this._playBeep(800, 0.25, 'sine', 0.12) }
    else if (name === 'bounce') { this._playBeep(200, 0.15, 'triangle', 0.1) }
    else if (name === 'buzzer') { this._playBeep(220, 0.5, 'square', 0.1) }
    else if (name === 'block') { this._playBeep(100, 0.3, 'sawtooth', 0.12) }
    else if (name === 'steal') { this._playBeep(600, 0.15, 'square', 0.08) }
    else if (name === 'score') { this._playBeep(523, 0.15, 'sine', 0.1); setTimeout(this._playBeep.bind(this, 659, 0.12, 'sine', 0.1), 100); setTimeout(this._playBeep.bind(this, 784, 0.2, 'sine', 0.12), 200) }
    else if (name === 'crowd') { for (var i = 0; i < 5; i++) { var f = 200 + Math.random() * 300; setTimeout(this._playBeep.bind(this, f, 0.2, 'triangle', 0.03), i * 50) } }
  } catch(e) {}
}

// Add sound init to constructor
var _origInit2 = GameEngine.prototype._init
GameEngine.prototype._init = function() {
  _origInit2.call(this)
  this._initSound()
}
</script>
<script>

// ============ WEB GAME CONTROLLER ============
var canvas, ctx, engine, p1, p2, gameLoop, lastFrame;
var gameState = {started:false, duration:120, scoringMode:'alternate'};

function $(id){ return document.getElementById(id); }

var meter = $('meter'), meterGreen = $('meterGreen'), meterFill = $('meterFill'), meterMark = $('meterMark');
var msgBox = $('msg'), msgText = $('msgText');
var joyBase = $('joyBase'), joyDot = $('joyDot'), joyArea = $('joyArea');
var btnShoot = $('btnShoot'), btnRebound = $('btnRebound'), btnDrive = $('btnDrive'), btnSteal = $('btnSteal'), btnBlock = $('btnBlock');
var setupOverlay = $('setupOverlay'), gameOverOverlay = $('gameOverOverlay');

// ============ CANVAS ============
function initCanvas() {
  canvas = $('gc');
  if (!canvas) { showError('找不到Canvas元素!'); return; }
  ctx = canvas.getContext('2d');
  if (!ctx) { showError('无法获取Canvas 2D上下文!'); return; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function showError(msg) {
  var e = document.getElementById('errBox');
  if (!e) { e = document.createElement('div'); e.id = 'errBox'; e.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;background:rgba(255,0,0,0.85);color:#fff;padding:15px;z-index:99999;border-radius:10px;font-size:14px;white-space:pre-wrap;max-height:80vh;overflow:auto'; document.body.appendChild(e); }
  e.textContent += msg + '\n'; e.style.display = 'block';
}

function resizeCanvas() {
  var w = window.innerWidth, h = window.innerHeight;
  var dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  if (engine) { engine.w = w; engine.h = h; engine.s = Math.min(w / COURT_W, h / COURT_H); }
}

// ============ SCREENS ============
function showScreen(id) {
  var els = document.querySelectorAll('.overlay');
  for (var i = 0; i < els.length; i++) els[i].classList.add('hidden');
  if (id) $(id).classList.remove('hidden');
}

// ============ PLAYER SELECTION ============
var selP1 = null, selP2 = null, selTeam1 = 'liaoning', selTeam2 = 'guangdong';

function getTeamPlayers(teamId) {
  return getPlayersByTeam(teamId);
}

function buildTeamSelector(containerId, side) {
  var teams = getTeams();
  var html = '';
  for (var i = 0; i < teams.length; i++) {
    var t = teams[i];
    html += '<div class="team-tab" data-team="' + t.id + '" style="border-left:3px solid ' + t.color + '">' + t.abbr + ' (' + t.count + ')</div>';
  }
  $(containerId).innerHTML = html;
  // Click handlers
  var tabs = $(containerId).querySelectorAll('.team-tab');
  for (var j = 0; j < tabs.length; j++) {
    tabs[j].addEventListener('click', function() {
      var tid = this.getAttribute('data-team');
      if (side === 'p1') { selTeam1 = tid; selP1 = null; }
      else { selTeam2 = tid; selP2 = null; }
      // Highlight
      var all = this.parentElement.querySelectorAll('.team-tab');
      for (var k = 0; k < all.length; k++) all[k].classList.remove('sel');
      this.classList.add('sel');
      buildPlayerGrid(side === 'p1' ? 'playerGrid' : 'playerGrid2', side);
    });
  }
  // Select first by default
  if (tabs.length > 0) tabs[side === 'p1' ? 0 : 1].classList.add('sel');
}

function buildPlayerGrid(containerId, side) {
  var tid = side === 'p1' ? selTeam1 : selTeam2;
  var players = getPlayersByTeam(tid);
  var grid = $(containerId);
  grid.innerHTML = '';
  for (var i = 0; i < players.length; i++) {
    (function(p) {
      var card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = '<span class="p-num" style="color:' + p.teamColor + '">' + p.num + '</span><span class="p-name">' + p.name + '</span><span class="p-pos">' + p.pos + '</span>';
      card.addEventListener('click', function() {
        if (side === 'p1') { selP1 = p; selectInGrid(this, 'playerGrid'); }
        else { selP2 = p; selectInGrid(this, 'playerGrid2'); }
      });
      grid.appendChild(card);
    })(players[i]);
  }
}

function selectInGrid(el, gridId) {
  var cards = $(gridId).querySelectorAll('.player-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('sel');
  el.classList.add('sel');
}

// Build team selectors
buildTeamSelector('teamTabs1', 'p1');
buildTeamSelector('teamTabs2', 'p2');
buildPlayerGrid('playerGrid', 'p1');
buildPlayerGrid('playerGrid2', 'p2');
selP1 = getPlayersByTeam('liaoning')[0];
selP2 = getPlayersByTeam('guangdong')[0];
setTimeout(function() {
  var c1 = $('playerGrid').querySelectorAll('.player-card');
  var c2 = $('playerGrid2').querySelectorAll('.player-card');
  if (c1[0]) c1[0].classList.add('sel');
  if (c2[0]) c2[0].classList.add('sel');
}, 200);

// ============ GAME MODE SELECTION ============
gameState.gameMode = 'ai';
$('modeAI').addEventListener('click', function(){gameState.gameMode='ai';updateModeTabs()});
$('modeLocal').addEventListener('click', function(){gameState.gameMode='local';updateModeTabs()});
$('modeOnline').addEventListener('click', function(){gameState.gameMode='online';updateModeTabs()});
$('mode3pt').addEventListener('click', function(){gameState.gameMode='3pt';updateModeTabs()});
function updateModeTabs(){
  var m=gameState.gameMode;
  $('modeAI').classList.toggle('on',m==='ai');
  $('modeLocal').classList.toggle('on',m==='local');
  $('modeOnline').classList.toggle('on',m==='online');
  $('mode3pt').classList.toggle('on',m==='3pt');
}

// ============ SCORING MODE ============
function updateModeUI() {
  var m = gameState.scoringMode;
  $('modeAlt').classList.toggle('on', m === 'alternate');
  $('modeKeep').classList.toggle('on', m === 'keep');
  $('modeHint').textContent = m === 'alternate' ? '进球后交换球权' : '进球方继续进攻';
}
$('modeAlt').addEventListener('click', function() { gameState.scoringMode = 'alternate'; updateModeUI(); });
$('modeKeep').addEventListener('click', function() { gameState.scoringMode = 'keep'; updateModeUI(); });

// ============ TIME SELECTION ============
var timeBtns = document.querySelectorAll('.time-btn');
for (var i = 0; i < timeBtns.length; i++) {
  timeBtns[i].addEventListener('click', function() {
    var dur = parseInt(this.getAttribute('data-dur')) || 120;
    if (dur === 0) {
      dur = parseInt($('customTime').value) || 120;
      dur = Math.max(30, Math.min(600, dur));
      $('customTime').value = dur;
    }
    gameState.duration = dur;
    startGame();
  });
}

// ============ START GAME ============
function startGame() {
  if (!selP1 || !selP2) { alert('请先选择球员'); return; }
  p1 = selP1; p2 = selP2;

  if (gameState.gameMode === '3pt') {
    start3PTContest();
    return;
  }

  if (gameState.gameMode === 'online') {
    // Online mode - try WebSocket connection
    showScreen(null);
    var wsHost = prompt('输入服务器地址 (格式: IP:端口):', '10.32.17.144:3456');
    if (!wsHost) { showScreen('setupOverlay'); return; }
    connectOnline(wsHost);
    return;
  }

  // AI or local mode
  showScreen(null);
  gameState.started = true;
  gameState.isAI = gameState.gameMode === 'ai';

  engine = new GameEngine(canvas, ctx, window.innerWidth, window.innerHeight, {
    gameDuration: gameState.duration,
    scoringMode: gameState.scoringMode
  });
  engine.setPlayers(p1, p2);
  engine.scoringMode = gameState.scoringMode;
  if (gameState.isAI) {
    engine._aiMode = true; // AI controls defense
  }

  $('p1name').textContent = p1.name;
  $('p1name').style.color = p1.teamColor;
  $('p2name').textContent = p2.name;
  $('p2name').style.color = p2.teamColor;
  $('score0').textContent = '0';
  $('score1').textContent = '0';
  $('gameTimer').textContent = formatTime(gameState.duration);

  lastFrame = performance.now();
  if (gameLoop) cancelAnimationFrame(gameLoop);
  gameLoop = requestAnimationFrame(tick);
}

// ============ 3-POINT CONTEST ============
var pt3State = {phase:'p1', shots:0, p1Score:0, p2Score:0, shooting:false}

function start3PTContest() {
  showScreen(null);
  gameState.started = true;
  pt3State = {phase:'p1', shots:0, p1Score:0, p2Score:0, shooting:false};
  engine = new GameEngine(canvas, ctx, window.innerWidth, window.innerHeight, {gameDuration:120, scoringMode:'alternate'});
  engine.setPlayers(p1, p2);
  engine._jumpBallPhase = 'done';
  // Position offense at 3pt line
  engine.off.x = engine._s(RIM_X - 300);
  engine.off.y = engine._s(FLOOR_Y - 20);
  engine.def.x = engine._s(RIM_X - 50);
  engine.def.y = engine._s(FLOOR_Y - 20);
  engine.ball.has = true;
  engine.poss = 0;

  $('p1name').textContent = p1.name; $('p1name').style.color = p1.teamColor;
  $('p2name').textContent = p2.name; $('p2name').style.color = p2.teamColor;
  $('score0').textContent = '0'; $('score1').textContent = '0';
  $('gameTimer').textContent = (pt3State.phase==='p1'?p2.name:p1.name)+':0/'+(pt3State.shots);

  lastFrame = performance.now();
  if (gameLoop) cancelAnimationFrame(gameLoop);
  gameLoop = requestAnimationFrame(tick3PT);
}

function tick3PT(now) {
  if (!engine || !gameState.started) { gameLoop=requestAnimationFrame(tick3PT); return; }
  try {
    var dt = now - lastFrame; lastFrame = now;
    if (dt > 50) dt = 33;
    engine._move(dt);
    engine.render();
    syncUI3PT();
    if (engine.gameOver && !engine._uiEnded) { engine._uiEnded=true; showGameOver(); }
  } catch(e) { console.error(e); }
  gameLoop = requestAnimationFrame(tick3PT);
}

function syncUI3PT() {
  $('score0').textContent = pt3State.p1Score;
  $('score1').textContent = pt3State.p2Score;
  $('shotClock').textContent = (5-pt3State.shots)+'球';
  $('gameTimer').textContent = (pt3State.phase==='p1'?p1.name:p2.name)+' '+(pt3State.shots)+'/5';
}

function shoot3PT() {
  if (!engine || pt3State.shooting) return;
  pt3State.shooting = true;
  engine.startShoot();
  setTimeout(function() {
    if (!engine) return;
    engine.releaseShoot();
    pt3State.shots++;
    pt3State.shooting = false;
    // Check if made (simplified: use shot result)
    setTimeout(function() {
      if (!engine || !engine.shotResult) return;
      var made = engine.shotResult.made;
      if (pt3State.phase === 'p1') { if (made) pt3State.p1Score += 3; }
      else { if (made) pt3State.p2Score += 3; }
      // Reset ball
      engine.ball.has = true; engine.ballInAir = false; engine.ballLoose = false;
      engine.shotResult = null; engine.shotReleased = false; engine.shooting = false;
      engine.ball.x = engine.off.x + engine.off.r;
      engine.ball.y = engine.off.y - engine.off.r * 1.2;
      engine.shotClockTimer = 0;

      if (pt3State.shots >= 5) {
        if (pt3State.phase === 'p1') {
          pt3State.phase = 'p2'; pt3State.shots = 0;
          engine.poss = 1;
          engine.off.x = engine._s(RIM_X - 300);
          engine._resetPos();
          engine.poss = 1;
        } else {
          // Contest over
          engine.gameOver = true;
          engine.winner = pt3State.p1Score > pt3State.p2Score ? 0 : (pt3State.p2Score > pt3State.p1Score ? 1 : -1);
          engine.score = [pt3State.p1Score, pt3State.p2Score];
          engine.stats = {p1:{pts:pt3State.p1Score,blk:0,stl:0,reb:0}, p2:{pts:pt3State.p2Score,blk:0,stl:0,reb:0}};
          showGameOver();
        }
      }
    }, 800);
  }, 300 + Math.random() * 200);
}

// Add 3pt shoot button handler
var btn3PT = document.getElementById('btn3PT');
if (btn3PT) { btn3PT.addEventListener('touchstart', function(e) { e.preventDefault(); if (gameState.gameMode==='3pt') shoot3PT(); }); btn3PT.addEventListener('mousedown', function(e) { e.preventDefault(); if (gameState.gameMode==='3pt') shoot3PT(); }); }

function formatTime(sec) {
  var m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

// ============ GAME LOOP ============
function showError(msg) {
  var e = document.getElementById('errBox');
  if (!e) { e = document.createElement('div'); e.id = 'errBox'; e.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;background:rgba(255,0,0,0.8);color:#fff;padding:15px;z-index:99999;border-radius:10px;font-size:14px;white-space:pre-wrap;max-height:80vh;overflow:auto'; document.body.appendChild(e); }
  e.textContent += msg + '\n';
  e.style.display = 'block';
}

function tick(now) {
  if (!engine || !gameState.started) { gameLoop = requestAnimationFrame(tick); return; }
  try {
    var dt = now - lastFrame;
    lastFrame = now;
    if (dt > 50) dt = 33;
    engine.update(dt);
    engine.render();
    syncUI();
    if (engine.gameOver && !engine._uiEnded) {
      engine._uiEnded = true;
      showGameOver();
    }
  } catch(e) {
    showError('Tick error: ' + e.message + ' | line: ' + e.lineNumber + ' | stack: ' + (e.stack||''));
  }
  gameLoop = requestAnimationFrame(tick);
}

function syncUI() {
  var s = engine.getState();
  $('score0').textContent = s.score[0];
  $('score1').textContent = s.score[1];
  $('shotClock').textContent = s.shotClock + 's';
  $('gameTimer').textContent = formatTime(s.gameTime);

  if (s.shooting && !engine.shotReleased) {
    meter.classList.add('show');
    var pct = Math.floor(s.shotPower * 100);
    meterFill.style.width = pct + '%';
    meterMark.style.left = pct + '%';
    meterGreen.style.left = Math.floor(s.chargeZoneLo * 100) + '%';
    meterGreen.style.width = Math.floor((s.chargeZoneHi - s.chargeZoneLo) * 100) + '%';
  } else {
    meter.classList.remove('show');
  }

  if (s.messageText) {
    msgBox.classList.add('show');
    msgText.textContent = s.messageText;
  } else {
    msgBox.classList.remove('show');
  }

  var bl = s.ballLoose;
  btnShoot.classList.toggle('hidden', bl);
  btnRebound.classList.toggle('hidden', !bl);
  $('btnShootLabel').textContent = s.shooting ? '松手！' : '按住投篮';
}

function showGameOver() {
  var s = engine.getState(), w = s.winner;
  $('winText').textContent = (w === 0 ? p1.name : w === 1 ? p2.name : '') + ' 获胜！';
  $('finalScore').textContent = s.score[0] + ' - ' + s.score[1];
  $('stat1').textContent = p1.name + ': ' + (s.stats.p1.pts || 0) + '分 ' + (s.stats.p1.reb || 0) + '板 ' + (s.stats.p1.blk || 0) + '帽 ' + (s.stats.p1.stl || 0) + '断';
  $('stat2').textContent = p2.name + ': ' + (s.stats.p2.pts || 0) + '分 ' + (s.stats.p2.reb || 0) + '板 ' + (s.stats.p2.blk || 0) + '帽 ' + (s.stats.p2.stl || 0) + '断';
  showScreen('gameOverOverlay');
}

// ============ TOUCH JOYSTICK ============
var joyOn = false, joyRect = null;

function getJoyPos(touch) {
  if (!joyRect) {
    var r = joyBase.getBoundingClientRect();
    joyRect = { cx: r.left + r.width / 2, cy: r.top + r.height / 2, mr: r.width / 2 };
  }
  var dx = touch.clientX - joyRect.cx, dy = touch.clientY - joyRect.cy;
  var d = Math.sqrt(dx * dx + dy * dy);
  if (d > joyRect.mr) { dx = dx / d * joyRect.mr; dy = dy / d * joyRect.mr; }
  return { x: dx / joyRect.mr, y: dy / joyRect.mr };
}

joyArea.addEventListener('touchstart', function(e) {
  e.preventDefault(); joyOn = true;
  var p = getJoyPos(e.touches[0]);
  joyDot.style.left = (p.x * 50 + 50) + '%';
  joyDot.style.top = (p.y * 50 + 50) + '%';
  if (engine) engine.setOffMove(p.x, p.y);
});
joyArea.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!joyOn) return;
  var p = getJoyPos(e.touches[0]);
  joyDot.style.left = (p.x * 50 + 50) + '%';
  joyDot.style.top = (p.y * 50 + 50) + '%';
  if (engine) engine.setOffMove(p.x, p.y);
});
joyArea.addEventListener('touchend', function(e) {
  e.preventDefault(); joyOn = false;
  joyDot.style.left = '50%'; joyDot.style.top = '50%';
  joyRect = null;
  if (engine) engine.setOffMove(0, 0);
});
joyArea.addEventListener('touchcancel', function() {
  joyOn = false; joyDot.style.left = '50%'; joyDot.style.top = '50%';
  joyRect = null;
  if (engine) engine.setOffMove(0, 0);
});

// ============ ACTION BUTTONS ============
btnShoot.addEventListener('touchstart', function(e) {
  e.preventDefault(); btnShoot.classList.add('on');
  if (engine) engine.startShoot();
});
btnShoot.addEventListener('touchend', function(e) {
  e.preventDefault(); btnShoot.classList.remove('on');
  if (engine) engine.releaseShoot();
});
btnShoot.addEventListener('touchcancel', function() {
  btnShoot.classList.remove('on');
  if (engine) engine.releaseShoot();
});

btnRebound.addEventListener('touchstart', function(e) {
  e.preventDefault(); btnRebound.classList.add('on');
  if (engine) engine.attemptRebound();
  setTimeout(function() { btnRebound.classList.remove('on'); }, 200);
});

function bindAction(el, action) {
  el.addEventListener('touchstart', function(e) {
    e.preventDefault(); el.classList.add('on');
    if (engine) engine[action]();
    setTimeout(function() { el.classList.remove('on'); }, 300);
  });
}
bindAction(btnDrive, 'attemptDrive');
bindAction(btnSteal, 'attemptSteal');
bindAction(btnBlock, 'attemptBlock');

// Desktop mouse support
btnShoot.addEventListener('mousedown', function(e) { e.preventDefault(); btnShoot.classList.add('on'); if (engine) engine.startShoot(); });
btnShoot.addEventListener('mouseup', function(e) { e.preventDefault(); btnShoot.classList.remove('on'); if (engine) engine.releaseShoot(); });
btnRebound.addEventListener('mousedown', function(e) { e.preventDefault(); btnRebound.classList.add('on'); if (engine) engine.attemptRebound(); setTimeout(function() { btnRebound.classList.remove('on'); }, 200); });
btnDrive.addEventListener('mousedown', function(e) { e.preventDefault(); btnDrive.classList.add('on'); if (engine) engine.attemptDrive(); setTimeout(function() { btnDrive.classList.remove('on'); }, 300); });
btnSteal.addEventListener('mousedown', function(e) { e.preventDefault(); btnSteal.classList.add('on'); if (engine) engine.attemptSteal(); setTimeout(function() { btnSteal.classList.remove('on'); }, 300); });
btnBlock.addEventListener('mousedown', function(e) { e.preventDefault(); btnBlock.classList.add('on'); if (engine) engine.attemptBlock(); setTimeout(function() { btnBlock.classList.remove('on'); }, 300); });

// ============ GAME OVER BUTTONS ============
$('btnRematch').addEventListener('click', function() {
  engine._uiEnded = false;
  gameState.started = false;
  gameOverOverlay.classList.add('hidden');
  startGame();
});
$('btnNewGame').addEventListener('click', function() {
  engine._uiEnded = false;
  gameState.started = false;
  gameOverOverlay.classList.add('hidden');
  showScreen('setupOverlay');
});

// ============ PREVENT SCROLL ============
document.addEventListener('touchmove', function(e) {
  if (e.target.closest && e.target.closest('.ov-box')) return;
  e.preventDefault();
}, { passive: false });

// ============ INIT ============
try {
  initCanvas();
  showScreen('setupOverlay');
  updateModeUI();
} catch(e) {
  showError('Init error: ' + e.message + ' stack: ' + (e.stack||''));
}
</script>
</body></html>
